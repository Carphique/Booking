<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

    <div class="header">Booking</div>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-title">Вхід</div>

            <input id="email" class="auth-input" type="email" placeholder="Email">
            <input id="password" class="auth-input" type="password" placeholder="Пароль">

            <button class="auth-btn" onclick="login()">Увійти</button>

            <div class="auth-link">
                Немає акаунту? <a href="register.html">Реєстрація</a>
            </div>

        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>

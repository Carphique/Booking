<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Бронювання</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div class="header">Booking</div>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Бронювання</h2>

            <input type="email" id="email" class="auth-input" placeholder="Email">

            <label>Дата заїзду</label>
            <input type="date" id="from" class="auth-input">

            <label>Дата виїзду</label>
            <input type="date" id="to" class="auth-input">

            <button class="auth-btn" onclick="createBooking()">
                Підтвердити
            </button>

            <p id="result"></p>
        </div>
    </div>

    <script src="js/booking.js"></script>
</body>
</html>

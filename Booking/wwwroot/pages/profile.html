<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особистий кабінет - Booking Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark booking-navbar pb-2 pt-2">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html">Booking.com</a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Вийти з акаунту</button>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-4">
                <li class="breadcrumb-item"><a href="../index.html" class="text-decoration-none">Головна</a></li>
                <li class="breadcrumb-item active">Особистий кабінет</li>
            </ol>
        </nav>

        <h2 class="fw-bold mb-4">Особистий кабінет</h2>

        <ul class="nav nav-pills mb-4 gap-2" id="profileTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold px-4" data-bs-toggle="tab" data-bs-target="#favorites" type="button" role="tab" onclick="loadFavorites()">
                    <i class="bi bi-heart-fill text-danger me-1"></i> Збережене
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold px-4 bg-white border" data-bs-toggle="tab" data-bs-target="#bookings" type="button" role="tab" onclick="loadBookings()">
                    <i class="bi bi-calendar-check text-primary me-1"></i> Мої бронювання
                </button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">

            <div class="tab-pane fade show active" id="favorites" role="tabpanel">
                <div id="favoritesList" class="d-flex flex-column gap-3">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>

            <div class="tab-pane fade" id="bookings" role="tabpanel">
                <div id="bookingsList" class="d-flex flex-column gap-3">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/script.js"></script>
</body>
</html>

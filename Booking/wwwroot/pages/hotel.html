<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Готель - Booking Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark booking-navbar py-2" style="background-color: #003580;">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html">Booking.com</a>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <h2 class="fw-bold mb-1" id="hotelName">Завантаження...</h2>
        <p class="text-primary mb-3"><i class="bi bi-geo-alt-fill"></i> <span id="hotelCity">Місто</span></p>

        <div class="row g-2 mb-4">
            <div class="col-md-8"><img src="" class="img-fluid w-100 rounded" style="height: 400px; object-fit: cover;" alt="Main"></div>
            <div class="col-md-4 d-flex flex-column gap-2">
                <img src="" class="img-fluid w-100 rounded" style="height: 196px; object-fit: cover;" alt="Sub">
                <img src="" class="img-fluid w-100 rounded" style="height: 196px; object-fit: cover;" alt="Sub">
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <h5 class="fw-bold">Про готель</h5>
                <p>Розкішне житло в центрі міста з найкращими зручностями та краєвидом.</p>
                <div class="d-flex gap-4 mt-3 text-dark">
                    <span><i class="bi bi-wifi text-success fs-5"></i> Wi-Fi безкоштовно</span>
                    <span><i class="bi bi-p-circle text-success fs-5"></i> Парковка</span>
                </div>

                <div class="mt-4 p-3 border rounded bg-white">
                    <h5 class="fw-bold mb-3">Оберіть дати для бронювання</h5>
                    <div class="row">
                        <div class="col-md-6">
                            <label>Дата заїзду</label>
                            <input type="date" id="dateFrom" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label>Дата виїзду</label>
                            <input type="date" id="dateTo" class="form-control">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-primary text-white border-0 shadow p-3 text-center">
                    <h5 class="fw-bold">Ціна за ніч:</h5>
                    <h2 class="fw-bold" id="hotelPrice">UAH 0</h2>
                    <button class="btn btn-light text-primary fw-bold py-2 mt-3 fs-5" onclick="createBooking()">Забронювати зараз</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/script.js"></script>
</body>
</html>
